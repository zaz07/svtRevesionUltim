<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVT 2BAC : L'Architecte</title>
    <!-- Tailwind en ligne via CDN (pour le moment, à télécharger localement plus tard si nécessaire, mais supposons que c'est en cache ou utiliser un fichier CSS local) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; color: #1e293b; }
        h1, h2, h3, .font-outfit { font-family: 'Outfit', sans-serif; }
        .bento-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            border: 1px solid rgba(226, 232, 240, 0.8);
            padding: 1.5rem;
        }
        .header-bg {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="header-bg text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center hover:text-green-200 transition-colors">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Retour au Menu
                    </a>
                </div>
                <div class="font-outfit font-bold text-xl flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    Agent : L'Architecte
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
        
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 text-emerald-800" id="unit-title">Chargement de l'Unité...</h1>
            <p class="text-xl text-emerald-600 font-medium max-w-3xl mx-auto">Analyse structurelle et décomposition pédagogique du cours.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Colonne de gauche : Concepts Piliers -->
            <div class="lg:col-span-1 space-y-8">
                <div class="bento-card relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                        <svg class="w-6 h-6 text-blue-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Concepts Piliers
                    </h2>
                    <ul id="concepts-list" class="space-y-3 text-slate-700 text-sm">
                        <!-- Rempli par JS -->
                    </ul>
                </div>

                <div class="bento-card relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-purple-500"></div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                        <svg class="w-6 h-6 text-purple-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        Détails Critiques
                    </h2>
                    <ul id="details-list" class="space-y-3 text-slate-700 text-sm">
                        <!-- Rempli par JS -->
                    </ul>
                </div>
            </div>

            <!-- Colonne centrale : Zones de confusion -->
            <div class="lg:col-span-1">
                <div class="bento-card relative overflow-hidden h-full">
                    <div class="absolute top-0 left-0 w-full h-2 bg-red-500"></div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                        <svg class="w-6 h-6 text-red-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        Zones de Confusion
                    </h2>
                    <div id="confusions-list" class="space-y-4">
                        <!-- Rempli par JS -->
                    </div>
                </div>
            </div>

            <!-- Colonne de droite : Objectifs -->
            <div class="lg:col-span-1">
                <div class="bento-card relative overflow-hidden h-full">
                    <div class="absolute top-0 left-0 w-full h-2 bg-amber-500"></div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                        <svg class="w-6 h-6 text-amber-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                        Matrice d'Objectifs
                    </h2>
                    
                    <div class="space-y-6">
                        <div>
                            <h3 class="font-bold text-emerald-600 mb-2 border-b border-emerald-100 pb-1">Niveau Débutant</h3>
                            <ul id="obj-debutant" class="list-disc pl-5 text-sm text-slate-600 space-y-1"></ul>
                        </div>
                        <div>
                            <h3 class="font-bold text-blue-600 mb-2 border-b border-blue-100 pb-1">Niveau Intermédiaire</h3>
                            <ul id="obj-intermediaire" class="list-disc pl-5 text-sm text-slate-600 space-y-1"></ul>
                        </div>
                        <div>
                            <h3 class="font-bold text-purple-600 mb-2 border-b border-purple-100 pb-1">Niveau Expert</h3>
                            <ul id="obj-expert" class="list-disc pl-5 text-sm text-slate-600 space-y-1"></ul>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <!-- Chargement des données hors-ligne -->
    <!-- Chargement dynamique des données hors-ligne -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uniteId = urlParams.get('unite') || '1';
        document.write(`<script src="data/unite${uniteId}/architecte.js"><\/script>`);
    </script>
    
    <!-- Chargement du contrôleur JS -->
    <script src="js/agent_architecte.js"></script>
</body>
</html>

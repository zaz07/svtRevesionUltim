<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVT 2BAC : Le Forgeron</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff7ed; color: #1e293b; }
        h1, h2, h3, .font-outfit { font-family: 'Outfit', sans-serif; }
        .bento-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            border: 1px solid rgba(254, 215, 170, 0.8);
            padding: 2rem;
        }
        .header-bg {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        }
        
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 1rem;
            margin-top: 0.75rem;
            border: 2px solid #ffedd5;
            border-radius: 0.75rem;
            background-color: #fafafa;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 600;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #f97316;
            background-color: #fff7ed;
        }

        .option-btn.correct {
            border-color: #10b981;
            background-color: #d1fae5;
            color: #065f46;
        }

        .option-btn.wrong {
            border-color: #ef4444;
            background-color: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="header-bg text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center hover:text-orange-200 transition-colors">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Retour au Menu
                    </a>
                </div>
                <div class="font-outfit font-bold text-xl flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Agent : Le Forgeron
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-8 space-y-8">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2 text-orange-800" id="unit-title">Chargement...</h1>
            <p class="text-lg text-orange-600 font-medium">Forgez vos bases avec la répétition active et les astuces mnémotechniques.</p>
        </header>

        <div class="flex justify-between items-center bg-orange-100 p-4 rounded-xl border border-orange-200 font-bold text-orange-800">
            <div>Progression : <span id="progress-text">0/0</span></div>
            <div>Score : <span id="score-display">0</span></div>
        </div>

        <div id="quiz-container" class="bento-card relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-400 to-red-500"></div>
            
            <h2 id="question-text" class="text-2xl font-bold text-slate-800 mb-6 mt-2">
                <!-- Question injectée ici -->
            </h2>

            <div id="options-container" class="space-y-3">
                <!-- Boutons injectés ici -->
            </div>

            <!-- Feedback caché par défaut -->
            <div id="feedback-container" class="hidden mt-6 p-4 rounded-xl space-y-3">
                <div id="feedback-status" class="font-bold text-lg"></div>
                <p id="feedback-explanation" class="text-slate-700"></p>
                <div id="mnemo-box" class="bg-yellow-50 border border-yellow-200 p-3 rounded-lg flex items-start mt-2">
                    <span class="text-2xl mr-2">💡</span>
                    <div>
                        <strong class="text-yellow-800 text-sm uppercase tracking-wide">Astuce du Forgeron</strong>
                        <p id="feedback-mnemo" class="text-yellow-900 font-medium mt-1"></p>
                    </div>
                </div>
                <button id="next-btn" class="w-full mt-4 bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 px-4 rounded-xl transition-colors">
                    Question Suivante ➡️
                </button>
            </div>
        </div>

        <div id="result-container" class="hidden bento-card text-center py-12">
            <h2 class="text-4xl font-bold text-slate-800 mb-4 font-outfit">Entraînement Terminé !</h2>
            <p class="text-2xl text-slate-600 mb-8">Votre score de forge : <strong class="text-orange-600 text-5xl block mt-4" id="final-score">0%</strong></p>
            <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-lg text-lg">
                Recommencer l'entraînement
            </button>
        </div>

    </main>

    <!-- Chargement des données hors-ligne -->
    <!-- Chargement dynamique des données hors-ligne -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uniteId = urlParams.get('unite') || '1';
        document.write(`<script src="data/unite${uniteId}/forgeron.js"><\/script>`);
    </script>
    
    <!-- Chargement du contrôleur JS -->
    <script src="js/agent_forgeron.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVT 2BAC : Le Coach Neurosciences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        h1, h2, h3, .font-outfit { font-family: 'Outfit', sans-serif; }
        .bento-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1);
            border: 1px solid #bfdbfe;
            padding: 2rem;
        }
        .header-bg {
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
        }
        
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 1rem;
            margin-top: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            background-color: #f8fafc;
            color: #1e293b;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 600;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        .option-btn.correct {
            border-color: #10b981;
            background-color: #d1fae5;
            color: #065f46;
        }

        .option-btn.wrong {
            border-color: #ef4444;
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        /* Timer bar animation */
        #timer-bar {
            transition: width 1s linear;
        }
        .urgent { background-color: #ef4444 !important; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="header-bg text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center text-blue-200 hover:text-white transition-colors">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Retour au Menu
                    </a>
                </div>
                <div class="font-outfit font-bold text-xl flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Agent : Le Coach Neurosciences
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-8">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black mb-2 text-blue-700 font-outfit tracking-tight" id="unit-title">Chargement...</h1>
            <p class="text-lg text-slate-500 font-medium">Activation de la mémoire vive et de la synthèse neuronale.</p>
        </header>

        <!-- MENU DU COACH -->
        <div id="coach-menu" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Condensé -->
            <button onclick="startMode('condense')" class="bento-card hover:shadow-xl transition-all text-left group">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <span class="text-2xl">📝</span>
                </div>
                <h3 class="text-xl font-bold text-blue-800 mb-2">Fiche Express</h3>
                <p class="text-sm text-slate-600">Lecture en 2 min chrono. L'essentiel vital à mémoriser.</p>
            </button>

            <!-- Quiz Chrono -->
            <button onclick="startMode('chrono')" class="bento-card hover:shadow-xl transition-all text-left group">
                <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <span class="text-2xl">⏱️</span>
                </div>
                <h3 class="text-xl font-bold text-amber-600 mb-2">Quiz Chrono</h3>
                <p class="text-sm text-slate-600">10 questions. 10 secondes par question. Réflexes cognitifs.</p>
            </button>

            <!-- Boss de Fin -->
            <button onclick="startMode('boss')" class="bento-card hover:shadow-xl transition-all text-left group">
                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <span class="text-2xl">💀</span>
                </div>
                <h3 class="text-xl font-bold text-purple-800 mb-2">Le Boss de Fin</h3>
                <p class="text-sm text-slate-600">Des situations de réflexion complexe. Pas de limite de temps.</p>
            </button>
        </div>

        <!-- VUE CONDENSÉ -->
        <div id="view-condense" class="hidden bento-card">
            <button onclick="returnToMenu()" class="text-blue-600 font-bold mb-6 hover:underline flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Retour aux modes
            </button>
            <h2 class="text-3xl font-bold text-slate-800 mb-6 border-b pb-2">Résumé Ultra-Condensé</h2>
            <ul id="condense-list" class="space-y-4 text-slate-700 leading-relaxed text-lg">
                <!-- Rempli par JS -->
            </ul>
        </div>

        <!-- VUE QUIZ CHRONO / BOSS -->
        <div id="view-quiz" class="hidden bento-card relative overflow-hidden">
            <button onclick="returnToMenu()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div id="timer-container" class="w-full bg-slate-200 h-2 rounded-full mb-6 overflow-hidden">
                <div id="timer-bar" class="bg-blue-500 h-full w-full"></div>
            </div>

            <div class="flex justify-between items-center mb-4 text-sm font-bold text-slate-500 uppercase tracking-widest">
                <span id="quiz-mode-title">MODE</span>
                <span id="quiz-progress">0/0</span>
            </div>

            <h2 id="question-text" class="text-2xl font-bold text-slate-800 mb-6">
                <!-- Question injectée ici -->
            </h2>

            <div id="options-container" class="space-y-3">
                <!-- Boutons injectés ici -->
            </div>

            <div id="feedback-container" class="hidden mt-6 p-4 rounded-xl space-y-4">
                <div id="feedback-status" class="font-bold text-xl"></div>
                <p id="feedback-explanation" class="text-slate-700 font-medium"></p>
                <button id="next-btn" class="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-4 rounded-xl transition-colors">
                    Suivant ➡️
                </button>
            </div>
        </div>

        <!-- VUE RESULTAT QUIZ -->
        <div id="view-result" class="hidden bento-card text-center py-12">
            <h2 class="text-4xl font-black text-slate-800 mb-4 font-outfit">Entraînement Terminé</h2>
            <strong class="text-5xl block mb-6 text-blue-600" id="final-score">0%</strong>
            <button onclick="returnToMenu()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-8 rounded-full transition-colors">
                Retourner au Menu Coach
            </button>
        </div>

    </main>

    <!-- Chargement dynamique des données hors-ligne -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uniteId = urlParams.get('unite') || '1';
        document.write(`<script src="data/unite${uniteId}/coach.js"><\/script>`);
    </script>
    <script src="js/agent_coach.js"></script>
</body>
</html>

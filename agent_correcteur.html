<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVT 2BAC : Le Correcteur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdfa; color: #0f172a; }
        h1, h2, h3, .font-outfit { font-family: 'Outfit', sans-serif; }
        .bento-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(20, 184, 166, 0.1);
            border: 1px solid #ccfbf1;
            padding: 2rem;
        }
        .header-bg {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
        }
        .btn-tab {
            transition: all 0.2s;
        }
        .btn-tab.active {
            background-color: #0d9488;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.2);
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="header-bg text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center text-teal-200 hover:text-white transition-colors">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Retour au Menu
                    </a>
                </div>
                <div class="font-outfit font-bold text-xl flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Agent : Le Correcteur
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 space-y-8">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black mb-2 text-teal-700 font-outfit" id="unit-title">Chargement...</h1>
            <p class="text-lg text-teal-600 font-medium">Bilan des erreurs fréquentes et stratégies de révision optimisées.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- SECTION : ERREURS FREQUENTES -->
            <div class="lg:col-span-2 space-y-6" id="erreurs-container">
                <!-- Injecté par JS -->
            </div>

            <!-- SECTION : PARCOURS DE REVISION -->
            <div class="lg:col-span-1">
                <div class="bento-card sticky top-8">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                        <svg class="w-6 h-6 text-teal-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Parcours Express
                    </h2>
                    
                    <div class="flex space-x-2 mb-6 bg-slate-100 p-1 rounded-xl">
                        <button onclick="showParcours('5min')" id="tab-5min" class="btn-tab flex-1 py-2 rounded-lg text-sm font-bold text-slate-600 active">5 Min</button>
                        <button onclick="showParcours('15min')" id="tab-15min" class="btn-tab flex-1 py-2 rounded-lg text-sm font-bold text-slate-600">15 Min</button>
                        <button onclick="showParcours('30min')" id="tab-30min" class="btn-tab flex-1 py-2 rounded-lg text-sm font-bold text-slate-600">30 Min</button>
                    </div>

                    <div id="parcours-content" class="bg-teal-50 border border-teal-100 rounded-xl p-5">
                        <h3 class="font-bold text-teal-800 mb-3 uppercase tracking-wider text-sm" id="parcours-title">Plan d'action (5 min)</h3>
                        <ul id="parcours-list" class="space-y-3 text-slate-700 text-sm list-decimal pl-4 marker:text-teal-500 marker:font-bold">
                            <!-- Rempli par JS -->
                        </ul>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <!-- Chargement dynamique des données hors-ligne -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uniteId = urlParams.get('unite') || '1';
        document.write(`<script src="data/unite${uniteId}/correcteur.js"><\/script>`);
    </script>
    <script src="js/agent_correcteur.js"></script>
</body>
</html>

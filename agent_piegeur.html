<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVT 2BAC : Le Piégeur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        h1, h2, h3, .font-outfit { font-family: 'Outfit', sans-serif; }
        .bento-card {
            background: #1e293b;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            padding: 2rem;
        }
        .header-bg {
            background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
            border-bottom: 2px solid #b91c1c;
        }
        
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 1rem;
            margin-top: 0.75rem;
            border: 2px solid #334155;
            border-radius: 0.75rem;
            background-color: #0f172a;
            color: #cbd5e1;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 600;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #ef4444;
            background-color: #1e293b;
            color: #f8fafc;
        }

        .option-btn.correct {
            border-color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }

        .option-btn.wrong {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
        }
        
        .type-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .type-inversee { background-color: #7f1d1d; color: #fca5a5; border: 1px solid #f87171; }
        .type-piege { background-color: #4c1d95; color: #d8b4fe; border: 1px solid #c084fc; }
        .type-association { background-color: #1e3a8a; color: #93c5fd; border: 1px solid #60a5fa; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="header-bg text-white shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center text-slate-300 hover:text-red-400 transition-colors">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Fuir vers l'Accueil
                    </a>
                </div>
                <div class="font-outfit font-bold text-xl flex items-center text-red-500">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    Agent : Le Piégeur
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-8 space-y-8">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-red-800 font-outfit uppercase tracking-tight" id="unit-title">Chargement...</h1>
            <p class="text-lg text-slate-400 font-medium">Lisez chaque mot attentivement. Rien n'est laissé au hasard.</p>
        </header>

        <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700 font-bold text-slate-300">
            <div>Progression : <span id="progress-text" class="text-white">0/0</span></div>
            <div>Score Expert : <span id="score-display" class="text-red-400">0</span></div>
        </div>

        <div id="quiz-container" class="bento-card relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-red-600"></div>
            
            <div class="mb-4">
                <span id="question-type-badge" class="type-badge">TYPE</span>
            </div>

            <h2 id="question-text" class="text-2xl font-bold text-white mb-6 mt-2 leading-relaxed">
                <!-- Question injectée ici -->
            </h2>

            <div id="options-container" class="space-y-3">
                <!-- Boutons injectés ici -->
            </div>

            <!-- Feedback caché par défaut -->
            <div id="feedback-container" class="hidden mt-6 p-4 rounded-xl space-y-4">
                <div id="feedback-status" class="font-bold text-xl"></div>
                
                <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                    <strong class="text-slate-300 text-sm uppercase tracking-wider block mb-1">Analyse du Piégeur</strong>
                    <p id="feedback-explanation" class="text-slate-100 font-medium"></p>
                </div>

                <div id="piege-box" class="bg-red-900/20 border border-red-500/30 p-4 rounded-lg flex items-start">
                    <span class="text-2xl mr-3">⚠️</span>
                    <div>
                        <strong class="text-red-400 text-sm uppercase tracking-wide block mb-1">Le piège évité (ou pas)</strong>
                        <p id="feedback-piege" class="text-red-200 text-sm"></p>
                    </div>
                </div>

                <button id="next-btn" class="w-full mt-6 bg-red-700 hover:bg-red-600 text-white font-bold py-4 px-4 rounded-xl transition-colors shadow-[0_0_15px_rgba(220,38,38,0.3)]">
                    Affronter la question suivante
                </button>
            </div>
        </div>

        <div id="result-container" class="hidden bento-card text-center py-12">
            <h2 class="text-4xl font-black text-white mb-4 font-outfit">Analyse Terminée</h2>
            <p class="text-xl text-slate-400 mb-8">Votre niveau de vigilance :</p>
            <strong class="text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-red-600 text-6xl block mb-6" id="final-score">0%</strong>
            <p id="result-message" class="text-lg text-slate-300 mb-8 font-medium italic"></p>
            <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-full transition-colors">
                Retenter sa chance
            </button>
        </div>

    </main>

    <!-- Chargement des données hors-ligne -->
    <!-- Chargement dynamique des données hors-ligne -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uniteId = urlParams.get('unite') || '1';
        document.write(`<script src="data/unite${uniteId}/piegeur.js"><\/script>`);
    </script>
    
    <!-- Chargement du contrôleur JS -->
    <script src="js/agent_piegeur.js"></script>
</body>
</html>
